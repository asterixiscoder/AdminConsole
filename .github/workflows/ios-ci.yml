name: iOS CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HOME: /tmp/adminconsole-home
  CFFIXED_USER_HOME: /tmp/adminconsole-home
  XDG_CACHE_HOME: /tmp/adminconsole-xdg
  CLANG_MODULE_CACHE_PATH: /tmp/adminconsole-clang-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package-tests:
    name: Swift Package Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Build Environment
        run: |
          mkdir -p "$HOME"
          mkdir -p "$XDG_CACHE_HOME"
          mkdir -p "$CLANG_MODULE_CACHE_PATH"

      - name: Xcode Version
        run: xcodebuild -version

      - name: Resolve Swift Package Dependencies
        working-directory: Packages/AppModules
        run: swift package resolve --disable-sandbox

      - name: Run Swift Package Tests
        working-directory: Packages/AppModules
        run: swift test --disable-sandbox

  ios-build:
    name: iOS Simulator Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Build Environment
        run: |
          mkdir -p "$HOME"
          mkdir -p "$XDG_CACHE_HOME"
          mkdir -p "$CLANG_MODULE_CACHE_PATH"

      - name: Xcode Version
        run: xcodebuild -version

      - name: Build AdminConsole
        run: |
          xcodebuild \
            -project AdminConsole.xcodeproj \
            -scheme AdminConsoleApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath /tmp/AdminConsoleDerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CLANG_MODULE_CACHE_PATH="$CLANG_MODULE_CACHE_PATH"
